name: Release

on:
  push:
    # Build and publish artifacts for a release
    tags:
      - "v*.*.*"

jobs:

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      IMAGE_REGISTRY: ghcr.io/oracle
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Derive release versions
        id: versions
        shell: bash
        run: |
          APP_VERSION="${GITHUB_REF_NAME}"

          if [[ ! "${APP_VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must be stable SemVer prefixed with v, got ${APP_VERSION}"
            exit 1
          fi

          CHART_VERSION="${APP_VERSION#v}"

          echo "app-version=${APP_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "chart-version=${CHART_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "chart-package=dist/karpenter-${CHART_VERSION}.tgz" >> "${GITHUB_OUTPUT}"
          echo "charts-url=https://oracle.github.io/karpenter-provider-oci/charts" >> "${GITHUB_OUTPUT}"

      - name: Lint Helm chart
        run: helm lint chart

      - name: Package Helm chart
        run: |
          mkdir -p dist
          helm package chart \
            --version "${{ steps.versions.outputs.chart-version }}" \
            --app-version "${{ steps.versions.outputs.app-version }}" \
            --destination dist

      - name: Checkout gh-pages
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to Docker
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          tags: ghcr.io/oracle/karpenter-provider-oci:${{ github.ref_name }}

      - name: Publish Helm chart repository
        shell: bash
        run: |
          git -C gh-pages config user.name "github-actions[bot]"
          git -C gh-pages config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p gh-pages/charts
          cp "${{ steps.versions.outputs.chart-package }}" gh-pages/charts/
          helm repo index gh-pages/charts \
            --url "${{ steps.versions.outputs.charts-url }}" \
            --merge gh-pages/charts/index.yaml

          git -C gh-pages add charts
          git -C gh-pages commit -m "Releasing Helm chart: ${{ github.ref_name }}"
          git -C gh-pages push origin gh-pages
